apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ingress-api
  namespace: ecommerce-mf
  annotations:
    kubernetes.io/ingress.class: nginx
spec:
  rules:
    # Replace YOUR_ELB_HOST with actual ELB hostname after Phase 5
    - host: YOUR_ELB_HOST
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: api
                port:
                  number: 3000
