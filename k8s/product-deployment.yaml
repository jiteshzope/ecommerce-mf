apiVersion: apps/v1
kind: Deployment
metadata:
  name: product
  namespace: ecommerce-mf
spec:
  replicas: 1
  selector:
    matchLabels:
      app: product
  template:
    metadata:
      labels:
        app: product
    spec:
      containers:
        - name: product
          # Account ID updated for ECR image path
          image: 385576631527.dkr.ecr.us-east-1.amazonaws.com/ecommerce-mf/product:latest
          ports:
            - containerPort: 80
