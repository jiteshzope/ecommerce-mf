apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ingress-apps
  namespace: ecommerce-mf
  annotations:
    nginx.ingress.kubernetes.io/use-regex: "true"
    nginx.ingress.kubernetes.io/rewrite-target: /$1
spec:
  ingressClassName: nginx
  rules:
    # ELB host updated for ingress routing
    - host: a5d10a03df4854b31852097b4df725ec-1461367908.us-east-1.elb.amazonaws.com
      http:
        paths:
          - path: /product-remote/(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: product
                port:
                  number: 80
          - path: /cart-remote/(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: cart
                port:
                  number: 80
          - path: /auth-remote/(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: auth
                port:
                  number: 80
