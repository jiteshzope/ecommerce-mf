apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ingress-apps
  namespace: ecommerce-mf
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/use-regex: "true"
    nginx.ingress.kubernetes.io/rewrite-target: /$1
spec:
  rules:
    # Replace YOUR_ELB_HOST with actual ELB hostname after Phase 5
    - host: YOUR_ELB_HOST
      http:
        paths:
          - path: /product-remote/(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: product
                port:
                  number: 80
          - path: /cart-remote/(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: cart
                port:
                  number: 80
          - path: /auth-remote/(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: auth
                port:
                  number: 80
          - path: /(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: shell
                port:
                  number: 80
